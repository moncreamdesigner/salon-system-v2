<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Халгай салбар — Онлайн цаг захиалга</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&subset=cyrillic,cyrillic-ext&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      font-family: "Montserrat", sans-serif;
      color: #1d2720;
      background: #f5f7f4;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 15% 15%, rgba(96, 191, 99, .13), transparent 32%),
        #f5f7f4;
    }

    main {
      width: min(100%, 560px);
      padding: 48px 40px;
      text-align: center;
      background: #fff;
      border: 1px solid #dbe3da;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(31, 55, 34, .08);
    }

    img {
      width: min(230px, 72%);
      height: auto;
      margin-bottom: 30px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: #55b95b;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 5vw, 36px);
      line-height: 1.25;
    }

    p {
      margin: 18px auto 0;
      color: #738078;
      font-size: 15px;
      line-height: 1.7;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      padding: 12px 18px;
      color: #399842;
      background: #eef8ee;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .status::before {
      width: 8px;
      height: 8px;
      content: "";
      background: #60bf63;
      border-radius: 50%;
    }

    @media (max-width: 560px) {
      main { padding: 38px 24px; }
    }
  </style>
</head>
<body>
  <main>
    <img src="/assets/khalgai-salon-logo.png" alt="Халгай салбар">
    <p class="eyebrow">Онлайн үйлчилгээ</p>
    <h1>Цаг захиалга</h1>
    <p>Хэрэглэгчийн онлайн цаг захиалгын хэсгийг бэлтгэж байна.</p>
    <div class="status">Удахгүй нээгдэнэ</div>
  </main>
</body>
</html>
