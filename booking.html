<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Халгай клиник салон</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Philosopher:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="public.css?v=202607210735">
  <link rel="stylesheet" href="fliphtml5.css?v=202607210130">
</head>
<body>
  <main class="public-app" id="publicApp">
    <section class="public-view active" id="catalogView" data-public-view="catalog">
      <header class="public-logo-head"><img src="assets/khalgai-salon-logo.png" alt="Халгай клиник салон"></header>
      <div class="catalog-stage" id="catalogStage"></div>
    </section>

    <section class="public-view" id="bookingView" data-public-view="booking">
      <div id="salonDirectory"></div>
      <div class="hidden" id="salonDetail"></div>
    </section>

    <section class="public-view" id="resultsView" data-public-view="results">
      <header class="public-logo-head result-logo-head"><img src="assets/khalgai-salon-logo.png" alt="Халгай клиник салон"></header>
      <div class="result-feed" id="resultFeed"></div>
    </section>

    <nav class="public-bottom-nav" aria-label="Үндсэн цэс">
      <button class="active" type="button" data-public-target="catalog" aria-label="Каталоги">
        <span class="public-nav-icon" aria-hidden="true"><svg viewBox="0 0 48 48" fill="none"><path d="M7.5 9.5c7.5-1.4 12.7.2 16.5 4.1 3.8-3.9 9-5.5 16.5-4.1v25.2c-7.1-1.2-12.4.2-16.5 4-4.1-3.8-9.4-5.2-16.5-4V9.5Z"/><path d="M24 13.6v25.1M11.5 39.8c5.2-.7 9.4.2 12.5 2.7 3.1-2.5 7.3-3.4 12.5-2.7"/></svg></span><span>КАТАЛОГИ</span>
      </button>
      <button type="button" data-public-target="booking" aria-label="Цаг захиалга">
        <span class="public-nav-icon" aria-hidden="true"><svg viewBox="0 0 48 48" fill="none"><rect x="7" y="7" width="14" height="14" rx="3"/><rect x="27" y="7" width="14" height="14" rx="3"/><rect x="7" y="27" width="14" height="14" rx="3"/><rect x="27" y="27" width="14" height="14" rx="3"/></svg></span><span>ЦАГ ЗАХИАЛГА</span>
      </button>
      <button type="button" data-public-target="results" aria-label="Үр дүн">
        <span class="public-nav-icon" aria-hidden="true"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="17"/><path d="m15.5 24.5 5.7 5.8 11.8-12"/></svg></span><span>ҮР ДҮН</span>
      </button>
    </nav>
    <div class="public-toast" id="publicToast" role="status"></div>
  </main>
  <script src="fliphtml5.js?v=202607210130"></script>
  <script src="public.js?v=202607210455"></script>
</body>
</html>
